[lan]
label="LAN (self-hosted)"
available=yes
# Pinned to the current web client version on purpose: when the upstream fork bumps the
# client's major/minor, login fails with "outdated client" — that's the signal to
# re-sync. Bump this to match the new assets/releases/<version> after each update.
gameVersion=0.82.9
# Tokens are filled in by the LAN server from the Host the client connected with, so the
# scheme (ws/wss, http/https) and host/IP always match how the page was opened.
wolUrl="__LANWS__/wol"
apiRegUrl="__LANHTTP__/register"
wladderUrl="__LANHTTP__/ladder"
wgameresUrl="__LANHTTP__/wgameres"
mapTransferUrl="__LANHTTP__/map-transfer"
